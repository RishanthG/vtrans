<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <video autoplay muted loop playsinline id="background-video">
        <source src="{{ url_for('static', filename='images/background.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div id="overlay">
        <form action="#" onsubmit="return false;">
        <div class="login-form">
            <h2>Log In</h2>
            <div class="underline"></div>
            <div class="element">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter your email">
            </div>
            <div class="element">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="element">
                <input type="checkbox" name="" id="remember-me">
                <label for="remember-me">Remember Me</label>
            </div>
            <div class="element">
                <button id="login-page" type="button" onclick="off()">Sign In</button>
            </div>
            <div class="element">
                <a href="#">Forgot Password?</a>
            </div>
        </div>
        </form>
    </div>

    <header>
        <div class="head">
            <div class="head-left">
                <img src="{{ url_for('static', filename='images/LOGO.png') }}" alt="Vtrans logo" height="60" width="100">
                <img src="{{ url_for('static', filename='images/name.png') }}" alt="Vtrans" height="40" width="180">
             </div>
            <button class="btn-1" type="button" onclick="on()">LOGIN</button>
       </div>
    </header>

    <div class="container">
        <h2>AI Speech Translator</h2>
        <p class="tagline">Speak once. Understand everywhere.</p>

        <div class="field-group">
            <label for="language">🌍 Translate to</label>
            <select id="language">
                <option value="ta">Tamil</option>
                <option value="fr">French</option>
                <option value="hi">Hindi</option>
                <option value="de">German</option>
                <option value="kn">Kannada</option>
                <option value="ml">Malayalam</option>
            </select>
        </div>

        <div class="field-group">
            <button id="start-recording" class="glassy-button">🎙 Start Recording</button>
        </div>

        <div class="text-output">
            <p id="original-text">🎤 Speak now...</p>
            <p id="translated-text">🌐 Translation will appear here...</p>
        </div>

        <audio id="translated-audio" controls></audio>
    </div>

</body>
</html>
